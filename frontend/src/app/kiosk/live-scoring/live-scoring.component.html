<div class="scoring" *ngIf="state && state.config">
  <button class="team team--left"
          [disabled]="currentGame?.concluded"
          (click)="scoreLeft()">
    <div class="team__label">{{ teamLabel(leftTeam) }}</div>
    <div class="team__score">{{ leftScore }}</div>
    <div class="team__wins">{{ leftWins }} wins</div>
    <div class="team__tap">Tap for +1</div>
  </button>

  <button class="team team--right"
          [disabled]="currentGame?.concluded"
          (click)="scoreRight()">
    <div class="team__label">{{ teamLabel(rightTeam) }}</div>
    <div class="team__score">{{ rightScore }}</div>
    <div class="team__wins">{{ rightWins }} wins</div>
    <div class="team__tap">Tap for +1</div>
  </button>

  <div class="scoring__bar">
    <div class="scoring__meta">
      Game {{ state.currentGameIndex + 1 }} · Best of {{ state.config.bestOf }}
      · {{ state.config.isRanked ? 'Ranked' : 'Normal' }}
      <span class="scoring__swap-badge" *ngIf="sidesSwapped">↔ Sides switched</span>
    </div>
    <div class="scoring__actions">
      <button class="action" (click)="undo()">Undo</button>
      <button class="action action--danger" (click)="discard()">Discard Match</button>
    </div>
  </div>

  <div class="celebration" *ngIf="showGameCelebration">
    <div class="celebration__card">
      <div class="celebration__title">Game to {{ celebrationWinner === 1 ? teamLabel(state.team1) : teamLabel(state.team2) }}</div>
      <div class="celebration__score">{{ celebrationScore.team1 }} – {{ celebrationScore.team2 }}</div>
    </div>
  </div>
</div>
